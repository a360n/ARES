<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARES // SECURE SYSTEM LOGIN</title>
    <!-- Google Fonts: Outfit for sleek modern cyber typography -->
    <link href="/static/css/fonts_outfit.css" rel="stylesheet">
    <script src="/static/js/tailwind.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020408;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
        }
        .glass-panel {
            background: rgba(8, 12, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.1);
        }
        .glow-input:focus {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.5) !important;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-xl p-8 transition-all duration-300">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-lg mb-3 shadow-[0_0_15px_rgba(16,185,129,0.15)] animate-pulse">
                <!-- SECURE SHIELD SVG -->
                <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-widest text-slate-200">ARES CENTRAL CORE</h1>
            <p class="text-[10px] tracking-wider text-emerald-400 font-mono mt-1">FORENSIC SECURITY GATEWAY // AUTHORIZED USE ONLY</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <!-- Error Banner -->
            <div id="error-banner" class="hidden py-2 px-3 bg-rose-950/80 border border-rose-500/40 text-rose-400 text-xs rounded font-mono text-center flex items-center justify-center gap-2 animate-pulse">
                <svg class="w-4 h-4 text-rose-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                <span id="error-message">ACCESS DENIED</span>
            </div>

            <div>
                <label for="username" class="block text-[10px] font-mono font-semibold text-slate-400 uppercase tracking-widest mb-1.5">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                    class="w-full px-4 py-2.5 bg-slate-950/80 border border-white/10 rounded text-slate-200 text-sm focus:outline-none transition-all glow-input" 
                    placeholder="Enter security keyname...">
            </div>

            <div>
                <label for="password" class="block text-[10px] font-mono font-semibold text-slate-400 uppercase tracking-widest mb-1.5">Security Cipher</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="w-full px-4 py-2.5 bg-slate-950/80 border border-white/10 rounded text-slate-200 text-sm focus:outline-none transition-all glow-input" 
                    placeholder="••••••••••••">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold text-xs tracking-widest rounded transition-all duration-300 shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:shadow-[0_0_25px_rgba(16,185,129,0.45)] flex items-center justify-center gap-2 select-none uppercase">
                <svg class="w-4 h-4 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                Decrypt & Authenticate
            </button>
        </form>

        <div class="mt-8 border-t border-white/5 pt-4 text-center">
            <span class="text-[9px] font-mono text-slate-600 block uppercase">Session tracking relies on strict Httponly cookies</span>
            <span class="text-[9px] font-mono text-slate-600 block uppercase mt-0.5">Core version 3.2.1-Forensic // Port 5001 Secure</span>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit-btn');
            const errorBanner = document.getElementById('error-banner');
            const errorMsg = document.getElementById('error-message');

            const formData = new FormData(form);

            // Disable button and animate
            submitBtn.disabled = true;
            submitBtn.textContent = 'DECRYPTING SECURE MATRIX...';

            fetch('/api/login', {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(data => { throw new Error(data.error || 'Authentication Failed') });
                }
                return res.json();
            })
            .then(data => {
                // Success redirect
                window.location.href = (data.redirect && data.redirect !== '/') ? data.redirect : '/dashboard';
            })
            .catch(err => {
                // Show warning banner
                errorBanner.classList.remove('hidden');
                errorMsg.textContent = err.message.toUpperCase();
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<svg class="w-4 h-4 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Decrypt & Authenticate`;
            });
        }
    </script>
</body>
</html>
